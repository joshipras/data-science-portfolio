name: Deploy ML SD Flashcards

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: https://joshipras.github.io/data-science-portfolio/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Nuclear reset for Pages artifact
        working-directory: ml-sd-flashcards
        run: |
          rm -rf CNAME
          touch .nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ml-sd-flashcards/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
