name: TQQQ Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 14-21 * * 1-5"

jobs:
  monitor:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stock-monitoring-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Random Delay
        run: sleep $((RANDOM % 60))

      - name: Install Dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Select Monitor Mode
        run: |
          if [ "${GITHUB_REF_NAME}" = "master" ] || [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "MONITOR_ARGS=" >> "$GITHUB_ENV"
            echo "Running live alert mode on ${GITHUB_REF_NAME}."
          else
            echo "MONITOR_ARGS=--dry-run" >> "$GITHUB_ENV"
            echo "Running dry-run mode on branch: ${GITHUB_REF_NAME}"
          fi

      - name: Validate required secrets
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        run: |
          missing=()
          for key in EMAIL_USER EMAIL_PASS PUSHOVER_USER_KEY PUSHOVER_API_TOKEN; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing required GitHub Actions secrets: ${missing[*]}"
            echo "Set these in Repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Run Monitor
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python monitor_tqqq.py $MONITOR_ARGS

      - name: Commit status.json
        if: success() && (github.ref_name == 'master' || github.ref_name == 'main')
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add status.json
          if git diff --staged --quiet; then
            echo "No status.json changes to commit."
          else
            git commit -m "Update status.json from monitor run"
            git push
          fi
